name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36


    - name: Accept Android licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true


    - name: Install Android packages
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
        "platform-tools" \
        "platforms;android-34" \
        "build-tools;34.0.0"


    - name: Create buildozer spec
      run: |
        buildozer init


    - name: Fix buildozer spec
      run: |
        sed -i 's/^requirements =.*/requirements = python3,kivy==2.3.1/' buildozer.spec
        sed -i 's/^android.api =.*/android.api = 34/' buildozer.spec
        sed -i 's/^android.minapi =.*/android.minapi = 23/' buildozer.spec


    - name: Build APK
      run: |
        buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mohadeseh-Gym-APK
        path: bin/*.apk
