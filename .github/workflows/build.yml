name: Build APK


on:

  workflow_dispatch:



jobs:

  build:


    runs-on: ubuntu-22.04


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Install dependencies

      run: |

        sudo apt update

        sudo apt install -y \
          python3.11 \
          python3.11-dev \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config



    - name: Set Python 3.11

      run: |

        sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1



    - name: Install Buildozer

      run: |

        python3 -m pip install --upgrade pip

        pip3 install --user buildozer==1.5.0

        pip3 install --user cython==0.29.36



    - name: Clean old files

      run: |

        rm -rf .buildozer

        rm -rf bin



    - name: Build APK

      run: |

        ~/.local/bin/buildozer android debug



    - name: Upload APK

      uses: actions/upload-artifact@v4

      with:

        name: Mohadeseh-Gym-APK

        path: bin/*.apk
