name: Build APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Install system packages
      run: |
        sudo apt update

        sudo apt install -y \
        python3 \
        python3-pip \
        python3-venv \
        git \
        zip \
        unzip \
        openjdk-17-jdk \
        autoconf \
        libtool \
        pkg-config \
        zlib1g-dev \
        libffi-dev


    - name: Setup Python
      run: |
        python3 -m pip install --upgrade pip

        pip install \
        buildozer \
        cython==0.29.37 \
        virtualenv


    - name: Accept Android licenses
      run: |
        mkdir -p $HOME/.buildozer

        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true


    - name: Create buildozer folder
      run: |
        buildozer init || true


    - name: Build APK
      run: |
        buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4

      with:
        name: Mohadeseh-Gym-APK

        path: bin/*.apk
